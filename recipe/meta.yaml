{% set name = "do-mpc" %}
{% set version = "5.0.1" %}
{% set python_min = "3.10" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/do_mpc-{{ version }}.tar.gz
  sha256: 3cc846a67bbcfbbc914bc78fbda85eb54f90435d79f28abe6d326c7b72f4d9eb

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv
  number: 0

requirements:
  host:
    - python {{ python_min }}
    - pip
    - setuptools
  run:
    - python >={{ python_min }}
    - casadi >=3.6.0
    - numpy
    - matplotlib-base
    - scipy
    - pandas
    - pytorch >2.0.0
    - onnx >=1.13.0
    - ipykernel
    - asyncua
    - packaging

test:
  imports:
    - do_mpc
  commands:
    - pip check
  requires:
    - pip
    - python {{ python_min }}

about:
  home: https://www.do-mpc.com
  summary: Model predictive control python toolbox
  description: |
    do-mpc is a comprehensive open-source toolbox for
    robust model predictive control (MPC) and moving horizon estimation (MHE)
  license: LGPL-3.0-or-later
  license_file: LICENSE.txt
  doc_url: https://www.do-mpc.com
  dev_url: https://github.com/do-mpc/do-mpc

extra:
  recipe-maintainers:
    - beenje
